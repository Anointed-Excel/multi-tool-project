<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text Summarizer | Student 5</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --student5-color: #fdcb6e;
            --student5-dark: #f39c12;
            --student5-light: #fff3cd;
        }
        
        body {
            background: linear-gradient(135deg, #fff3cd 0%, #ffffff 100%);
            min-height: 100vh;
            padding: 2rem 0;
        }
        .mode-indicator {
    background: linear-gradient(135deg, #00b894 0%, #55efc4 100%);
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    text-align: center;
    font-weight: 600;
    margin-bottom: 20px;
    box-shadow: 0 4px 15px rgba(0, 184, 148, 0.3);
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%, 100% {
        box-shadow: 0 4px 15px rgba(0, 184, 148, 0.3);
    }
    50% {
        box-shadow: 0 4px 25px rgba(0, 184, 148, 0.5);
    }
}
        
        .tool-header {
            background: linear-gradient(135deg, var(--student5-color) 0%, var(--student5-dark) 100%);
            color: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(253, 203, 110, 0.3);
            margin-bottom: 2rem;
        }
        
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }
        
        .card-header {
            background: var(--student5-light);
            border-bottom: 2px solid var(--student5-color);
            font-weight: 600;
            border-radius: 15px 15px 0 0 !important;
        }
        
        .btn-primary {
            background: var(--student5-color);
            border: none;
            padding: 12px 30px;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            background: var(--student5-dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(253, 203, 110, 0.4);
        }
        
        .btn-secondary {
            background: #6c757d;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        textarea {
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s ease;
        }
        
        textarea:focus {
            border-color: var(--student5-color);
            box-shadow: 0 0 0 0.2rem rgba(253, 203, 110, 0.25);
        }
        
        .summary-output {
            background: white;
            border: 2px solid var(--student5-color);
            border-radius: 10px;
            padding: 2rem;
            min-height: 200px;
            line-height: 1.8;
            font-size: 1.05rem;
        }
        
        .word-count {
            background: var(--student5-light);
            padding: 8px 15px;
            border-radius: 8px;
            display: inline-block;
            font-weight: 600;
            color: var(--student5-dark);
        }
        
        .stats-card {
            background: var(--student5-light);
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
        }
        
        .stats-card h4 {
            color: var(--student5-dark);
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
        }
        
        .stats-card p {
            color: #666;
            margin: 0;
            font-size: 0.9rem;
        }
        
        .loading-spinner {
            display: none;
            text-align: center;
            padding: 2rem;
        }
        
        .loading-spinner.active {
            display: block;
        }
        
        .alert {
            border-radius: 10px;
            border: none;
        }
        
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: white;
            color: var(--student5-color);
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: var(--student5-color);
            color: white;
            transform: translateY(-2px);
        }
        
        .length-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .length-option {
            flex: 1;
            min-width: 100px;
        }
        
        .length-option input[type="radio"] {
            display: none;
        }
        
        .length-option label {
            display: block;
            padding: 12px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        .length-option input[type="radio"]:checked + label {
            background: var(--student5-color);
            color: white;
            border-color: var(--student5-color);
        }
        
        .length-option label:hover {
            border-color: var(--student5-color);
        }
    </style>
</head>
<body>
    <div class="mode-indicator">
  🟢 Local Mode – No Internet / No API Required
</div>

    <a href="/" class="back-btn">
        <i class="bi bi-arrow-left"></i> Back to Tools
    </a>

    <div class="container">
        <!-- Header -->
        <div class="tool-header">
            <h1 class="mb-3">
                <i class="bi bi-file-text"></i> AI Text Summarizer
            </h1>
            <p class="mb-0 lead">
                Instantly summarize long articles, documents, and texts using AI
            </p>
        </div>

        <!-- Input Card -->
        <div class="card">
            <div class="card-header">
                <i class="bi bi-pencil-square"></i> Enter Your Text
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label for="textInput" class="form-label">
                        Paste your text here (minimum 50 words)
                    </label>
                    <textarea 
                        class="form-control" 
                        id="textInput" 
                        rows="10" 
                        placeholder="Paste your article, essay, or any long text you want to summarize..."></textarea>
                    <div class="mt-2">
                        <span class="word-count">
                            <i class="bi bi-card-text"></i> 
                            Words: <span id="wordCount">0</span>
                        </span>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Summary Length</label>
                    <div class="length-selector">
                        <div class="length-option">
                            <input type="radio" name="length" id="short" value="short">
                            <label for="short">
                                <i class="bi bi-dash"></i><br>
                                Short<br>
                                <small>2-3 sentences</small>
                            </label>
                        </div>
                        <div class="length-option">
                            <input type="radio" name="length" id="medium" value="medium" checked>
                            <label for="medium">
                                <i class="bi bi-equals"></i><br>
                                Medium<br>
                                <small>One paragraph</small>
                            </label>
                        </div>
                        <div class="length-option">
                            <input type="radio" name="length" id="long" value="long">
                            <label for="long">
                                <i class="bi bi-plus"></i><br>
                                Long<br>
                                <small>Detailed summary</small>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="d-grid gap-2 d-md-flex">
                    <button class="btn btn-primary" id="summarizeBtn">
                        <i class="bi bi-magic"></i> Generate Summary
                    </button>
                    <button class="btn btn-secondary" id="clearBtn">
                        <i class="bi bi-x-circle"></i> Clear
                    </button>
                </div>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div class="loading-spinner" id="loadingSpinner">
            <div class="spinner-border text-warning" style="width: 3rem; height: 3rem;" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3 text-muted">AI is analyzing your text...</p>
        </div>

        <!-- Alert Messages -->
        <div id="alertContainer"></div>

        <!-- Output Card -->
        <div class="card" id="outputCard" style="display: none;">
            <div class="card-header">
                <i class="bi bi-stars"></i> Summary Result
            </div>
            <div class="card-body">
                <div class="summary-output" id="summaryOutput">
                    <!-- Summary will appear here -->
                </div>
                
                <!-- Statistics -->
                <div class="row mt-4">
                    <div class="col-md-4">
                        <div class="stats-card">
                            <h4 id="originalWords">0</h4>
                            <p>Original Words</p>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="stats-card">
                            <h4 id="summaryWords">0</h4>
                            <p>Summary Words</p>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="stats-card">
                            <h4 id="reduction">0%</h4>
                            <p>Size Reduction</p>
                        </div>
                    </div>
                </div>

                <div class="mt-3 d-grid gap-2 d-md-flex">
                    <button class="btn btn-secondary" id="copyBtn">
                        <i class="bi bi-clipboard"></i> Copy Summary
                    </button>
                    <button class="btn btn-secondary" id="downloadBtn">
                        <i class="bi bi-download"></i> Download as TXT
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const textInput = document.getElementById('textInput');
        const wordCount = document.getElementById('wordCount');
        const summarizeBtn = document.getElementById('summarizeBtn');
        const clearBtn = document.getElementById('clearBtn');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const outputCard = document.getElementById('outputCard');
        const summaryOutput = document.getElementById('summaryOutput');
        const alertContainer = document.getElementById('alertContainer');
        const copyBtn = document.getElementById('copyBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        // Update word count on input
        textInput.addEventListener('input', () => {
            const words = textInput.value.trim().split(/\s+/).filter(w => w.length > 0);
            wordCount.textContent = words.length;
        });

        // Summarize button
        summarizeBtn.addEventListener('click', async () => {
            const text = textInput.value.trim();
            const length = document.querySelector('input[name="length"]:checked').value;

            // Clear previous alerts
            alertContainer.innerHTML = '';

            // Validate input
            if (!text) {
                showAlert('Please enter some text to summarize', 'warning');
                return;
            }

            const words = text.split(/\s+/).filter(w => w.length > 0);
            if (words.length < 50) {
                showAlert('Please enter at least 50 words to summarize', 'warning');
                return;
            }

            // Show loading
            summarizeBtn.disabled = true;
            loadingSpinner.classList.add('active');
            outputCard.style.display = 'none';

            try {
                const response = await fetch('/api/summarize', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ text, length })
                });

                const result = await response.json();

                if (result.success) {
                    // Display summary
                    summaryOutput.innerHTML = result.data.summary;
                    
                    // Update statistics
                    document.getElementById('originalWords').textContent = result.data.wordCount.original;
                    document.getElementById('summaryWords').textContent = result.data.wordCount.summary;
                    
                    const reduction = Math.round((1 - result.data.wordCount.summary / result.data.wordCount.original) * 100);
                    document.getElementById('reduction').textContent = reduction + '%';
                    
                    // Show output card
                    outputCard.style.display = 'block';
                    
                    // Scroll to output
                    outputCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    
                    showAlert('Summary generated successfully!', 'success');
                } else {
                    showAlert(result.error || 'Failed to generate summary', 'danger');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Network error. Please check if the server is running.', 'danger');
            } finally {
                summarizeBtn.disabled = false;
                loadingSpinner.classList.remove('active');
            }
        });

        // Clear button
        clearBtn.addEventListener('click', () => {
            textInput.value = '';
            wordCount.textContent = '0';
            alertContainer.innerHTML = '';
            outputCard.style.display = 'none';
        });

        // Copy button
        copyBtn.addEventListener('click', () => {
            const summary = summaryOutput.textContent;
            navigator.clipboard.writeText(summary).then(() => {
                const originalText = copyBtn.innerHTML;
                copyBtn.innerHTML = '<i class="bi bi-check2"></i> Copied!';
                setTimeout(() => {
                    copyBtn.innerHTML = originalText;
                }, 2000);
            });
        });

        // Download button
        downloadBtn.addEventListener('click', () => {
            const summary = summaryOutput.textContent;
            const blob = new Blob([summary], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'summary.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        // Helper function to show alerts
        function showAlert(message, type) {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type} alert-dismissible fade show`;
            alert.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            alertContainer.appendChild(alert);
        }
    </script>
</body>
</html>
