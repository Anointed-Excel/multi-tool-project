<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator | Student 5</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --student5-color: #fdcb6e;
            --student5-dark: #f39c12;
            --student5-light: #fff3cd;
        }
        
        body {
            background: linear-gradient(135deg, #fff3cd 0%, #ffffff 100%);
            min-height: 100vh;
            padding: 2rem 0;
        }
        
        .tool-header {
            background: linear-gradient(135deg, var(--student5-color) 0%, var(--student5-dark) 100%);
            color: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(253, 203, 110, 0.3);
            margin-bottom: 2rem;
        }
        
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }
        
        .card-header {
            background: var(--student5-light);
            border-bottom: 2px solid var(--student5-color);
            font-weight: 600;
            border-radius: 15px 15px 0 0 !important;
        }
        
        .password-display {
            background: white;
            border: 3px solid var(--student5-color);
            border-radius: 12px;
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            word-break: break-all;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.3s ease;
        }
        
        .password-display.empty {
            color: #ccc;
            font-size: 1rem;
        }
        
        .strength-meter {
            margin-top: 1rem;
            height: 10px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.5s ease;
            border-radius: 10px;
        }
        
        .strength-label {
            text-align: center;
            margin-top: 0.5rem;
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        .btn-primary {
            background: var(--student5-color);
            border: none;
            padding: 12px 30px;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            background: var(--student5-dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(253, 203, 110, 0.4);
        }
        
        .btn-secondary {
            background: #6c757d;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .form-check-input:checked {
            background-color: var(--student5-color);
            border-color: var(--student5-color);
        }
        
        .length-slider {
            width: 100%;
        }
        
        .length-value {
            background: var(--student5-light);
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: 700;
            color: var(--student5-dark);
            font-size: 1.3rem;
        }
        
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: white;
            color: var(--student5-color);
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            z-index: 1000;
        }
        
        .back-btn:hover {
            background: var(--student5-color);
            color: white;
            transform: translateY(-2px);
        }
        
        .history-item {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Courier New', monospace;
            font-weight: 600;
        }
        
        .history-item:hover {
            border-color: var(--student5-color);
        }
        
        .copy-icon {
            cursor: pointer;
            color: var(--student5-color);
            transition: all 0.2s ease;
        }
        
        .copy-icon:hover {
            transform: scale(1.2);
        }
        
        .alert {
            border-radius: 10px;
            border: none;
        }
    </style>
</head>
<body>
    <a href="/" class="back-btn">
        <i class="bi bi-arrow-left"></i> Back to Tools
    </a>

    <div class="container">
        <!-- Header -->
        <div class="tool-header">
            <h1 class="mb-3">
                <i class="bi bi-shield-lock"></i> Password Generator
            </h1>
            <p class="mb-0 lead">
                Generate secure, random passwords with customizable options
            </p>
        </div>

        <!-- Password Display Card -->
        <div class="card">
            <div class="card-header">
                <i class="bi bi-key"></i> Generated Password
            </div>
            <div class="card-body">
                <div class="password-display empty" id="passwordDisplay">
                    Click "Generate Password" to create a secure password
                </div>
                
                <!-- Strength Meter -->
                <div id="strengthContainer" style="display: none;">
                    <div class="strength-meter">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="strength-label" id="strengthLabel">-</div>
                </div>
                
                <div class="d-grid gap-2 d-md-flex mt-3">
                    <button class="btn btn-primary flex-fill" id="generateBtn">
                        <i class="bi bi-arrow-clockwise"></i> Generate Password
                    </button>
                    <button class="btn btn-secondary" id="copyBtn" disabled>
                        <i class="bi bi-clipboard"></i> Copy
                    </button>
                </div>
            </div>
        </div>

        <!-- Settings Card -->
        <div class="card">
            <div class="card-header">
                <i class="bi bi-sliders"></i> Customization Options
            </div>
            <div class="card-body">
                <!-- Length Slider -->
                <div class="mb-4">
                    <label class="form-label">
                        Password Length: <span class="length-value" id="lengthValue">16</span>
                    </label>
                    <input 
                        type="range" 
                        class="form-range length-slider" 
                        min="8" 
                        max="32" 
                        value="16" 
                        id="lengthSlider">
                    <div class="d-flex justify-content-between">
                        <small class="text-muted">8</small>
                        <small class="text-muted">32</small>
                    </div>
                </div>

                <!-- Character Type Checkboxes -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" id="uppercase" checked>
                            <label class="form-check-label" for="uppercase">
                                <i class="bi bi-alphabet-uppercase"></i> Uppercase (A-Z)
                            </label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" id="lowercase" checked>
                            <label class="form-check-label" for="lowercase">
                                <i class="bi bi-alphabet"></i> Lowercase (a-z)
                            </label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" id="numbers" checked>
                            <label class="form-check-label" for="numbers">
                                <i class="bi bi-123"></i> Numbers (0-9)
                            </label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" id="symbols" checked>
                            <label class="form-check-label" for="symbols">
                                <i class="bi bi-asterisk"></i> Symbols (!@#$%^&*)
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Additional Options -->
                <div class="mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="excludeSimilar">
                        <label class="form-check-label" for="excludeSimilar">
                            <i class="bi bi-eye-slash"></i> Exclude similar characters (I, l, 1, O, 0)
                        </label>
                    </div>
                </div>

                <!-- Multiple Password Generation -->
                <div class="mb-3">
                    <label class="form-label">Generate Multiple Passwords</label>
                    <select class="form-select" id="countSelect">
                        <option value="1" selected>1 password</option>
                        <option value="3">3 passwords</option>
                        <option value="5">5 passwords</option>
                        <option value="10">10 passwords</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Alert Container -->
        <div id="alertContainer"></div>

        <!-- Password History Card -->
        <div class="card" id="historyCard" style="display: none;">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-clock-history"></i> Password History</span>
                <button class="btn btn-sm btn-secondary" id="clearHistoryBtn">
                    <i class="bi bi-trash"></i> Clear
                </button>
            </div>
            <div class="card-body" id="historyContainer">
                <!-- History items will appear here -->
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const passwordDisplay = document.getElementById('passwordDisplay');
        const strengthContainer = document.getElementById('strengthContainer');
        const strengthBar = document.getElementById('strengthBar');
        const strengthLabel = document.getElementById('strengthLabel');
        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const lengthSlider = document.getElementById('lengthSlider');
        const lengthValue = document.getElementById('lengthValue');
        const alertContainer = document.getElementById('alertContainer');
        const historyCard = document.getElementById('historyCard');
        const historyContainer = document.getElementById('historyContainer');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');

        let passwordHistory = [];
        let currentPassword = '';

        // Update length value display
        lengthSlider.addEventListener('input', () => {
            lengthValue.textContent = lengthSlider.value;
        });

        // Generate Password
        generateBtn.addEventListener('click', async () => {
            // Clear alerts
            alertContainer.innerHTML = '';

            // Get settings
            const length = parseInt(lengthSlider.value);
            const includeUppercase = document.getElementById('uppercase').checked;
            const includeLowercase = document.getElementById('lowercase').checked;
            const includeNumbers = document.getElementById('numbers').checked;
            const includeSymbols = document.getElementById('symbols').checked;
            const excludeSimilar = document.getElementById('excludeSimilar').checked;
            const count = parseInt(document.getElementById('countSelect').value);

            // Validate at least one option is selected
            if (!includeUppercase && !includeLowercase && !includeNumbers && !includeSymbols) {
                showAlert('Please select at least one character type', 'warning');
                return;
            }

            // Show loading
            generateBtn.disabled = true;
            generateBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Generating...';

            try {
                const response = await fetch('/api/generate-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        length,
                        includeUppercase,
                        includeLowercase,
                        includeNumbers,
                        includeSymbols,
                        excludeSimilar,
                        count
                    })
                });

                const result = await response.json();

                if (result.success) {
                    const passwords = result.data.passwords;
                    const strength = result.data.strength;

                    // Display first password
                    currentPassword = passwords[0];
                    passwordDisplay.textContent = currentPassword;
                    passwordDisplay.classList.remove('empty');
                    copyBtn.disabled = false;

                    // Update strength meter
                    updateStrengthMeter(strength);

                    // Add to history
                    addToHistory(passwords);

                    // Show success message if multiple passwords
                    if (count > 1) {
                        showAlert(`Generated ${count} passwords successfully!`, 'success');
                    }
                } else {
                    showAlert(result.error || 'Failed to generate password', 'danger');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Network error. Please check if the server is running.', 'danger');
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerHTML = '<i class="bi bi-arrow-clockwise"></i> Generate Password';
            }
        });

        // Copy Password
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(currentPassword).then(() => {
                const originalText = copyBtn.innerHTML;
                copyBtn.innerHTML = '<i class="bi bi-check2"></i> Copied!';
                copyBtn.classList.remove('btn-secondary');
                copyBtn.classList.add('btn-success');
                
                setTimeout(() => {
                    copyBtn.innerHTML = originalText;
                    copyBtn.classList.remove('btn-success');
                    copyBtn.classList.add('btn-secondary');
                }, 2000);
                
                showAlert('Password copied to clipboard!', 'success');
            });
        });

        // Update Strength Meter
        function updateStrengthMeter(strength) {
            strengthContainer.style.display = 'block';
            strengthBar.style.width = strength.score + '%';
            strengthBar.style.backgroundColor = strength.color;
            strengthLabel.textContent = strength.level;
            strengthLabel.style.color = strength.color;
        }

        // Add to History
        function addToHistory(passwords) {
            // Add new passwords to beginning
            passwordHistory = [...passwords, ...passwordHistory].slice(0, 10);
            
            // Update display
            historyContainer.innerHTML = '';
            passwordHistory.forEach(password => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <span>${password}</span>
                    <i class="bi bi-clipboard copy-icon" onclick="copyHistoryPassword('${password}')"></i>
                `;
                historyContainer.appendChild(item);
            });
            
            historyCard.style.display = 'block';
        }

        // Copy from History
        window.copyHistoryPassword = function(password) {
            navigator.clipboard.writeText(password).then(() => {
                showAlert('Password copied from history!', 'success');
            });
        };

        // Clear History
        clearHistoryBtn.addEventListener('click', () => {
            passwordHistory = [];
            historyCard.style.display = 'none';
        });

        // Show Alert
        function showAlert(message, type) {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type} alert-dismissible fade show`;
            alert.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            alertContainer.appendChild(alert);
            
            // Auto-dismiss after 3 seconds
            setTimeout(() => {
                alert.remove();
            }, 3000);
        }

        // Generate a password on page load
        window.addEventListener('load', () => {
            generateBtn.click();
        });
    </script>
</body>
</html>
